# analysis-srv uses YAML-based config (not env vars directly).
# Mount this ConfigMap as a file at /app/config/config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: analysis-config
  namespace: smap
  labels:
    app.kubernetes.io/name: analysis
    app.kubernetes.io/part-of: smap
data:
  config.yaml: |
    database:
      url: "postgresql+asyncpg://smap_analysis:analysis_pwd@172.16.19.10:5432/smap"
      url_sync: "postgresql://smap_analysis:analysis_pwd@172.16.19.10:5432/smap"
      pool_size: 20
      max_overflow: 10

    logging:
      level: "DEBUG"
      debug: true

    kafka:
      bootstrap_servers: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
      topics:
        - "smap.collector.output"
      group_id: "analytics-service"

    redis:
      host: "redis-client.infrastructure.svc.cluster.local"
      port: 6379
      db: 0
      password: "21042004"
      max_connections: 50

    minio:
      endpoint: "172.16.21.10:9000"
      access_key: "tantai"
      secret_key: "21042004"
      secure: false
      crawl_results_bucket: "crawl-results"

    compression:
      enabled: true
      default_level: 2
      min_size_bytes: 1024

    preprocessor:
      min_text_length: 10
      max_comments: 5

    intent_classifier:
      confidence_threshold: 0.5
      patterns_path: "config/intent_patterns.yaml"

    impact:
      weight:
        view: 0.01
        like: 1.0
        comment: 2.0
        save: 3.0
        share: 5.0
      platform:
        tiktok: 1.0
        facebook: 1.2
        youtube: 1.5
        instagram: 1.1
        unknown: 1.0
      amplifier:
        negative: 1.5
        neutral: 1.0
        positive: 1.1
      threshold:
        viral: 70.0
        kol_followers: 50000
        max_raw_score: 100000.0
