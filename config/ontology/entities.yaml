# Ontology — Entity definitions
# Fields:
#   id              : unique slug (snake_case)
#   name            : canonical display name
#   entity_type     : brand | product | person | organization | location | event | other
#   entity_kind     : organization | vehicle | feature | service | person | generic
#   knowledge_layer : L1 (brand) | L2 (product line) | L3 (variant/model)
#   active_linking  : whether entity_enricher should match & link mentions to this entity
#   taxonomy_ids    : list of taxonomy node IDs this entity belongs to
#   aliases         : alternative spellings / hashtags / abbreviations to match against

entities:
  # ── L1 Brand ──────────────────────────────────────────────────────────────
  - id: "vinfast"
    name: "VinFast"
    entity_type: "brand"
    entity_kind: "organization"
    knowledge_layer: "L1"
    active_linking: true
    taxonomy_ids:
      - "automotive"
      - "electric_vehicle"
      - "vietnam_brand"
    aliases:
      - "VinFast"
      - "vinfast"
      - "Vin Fast"
      - "VINFAST"
      - "vinfas"            # common typo
