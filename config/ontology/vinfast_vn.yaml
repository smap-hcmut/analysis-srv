topics:
  - topic_key: launch
    label: Product Launch and Rollout
    topic_family: launch_rollout
    main_path_policy: core
    description: Conversation about launches, openings, rollout timing, and early availability.
    seed_phrases:
      - ra mắt
      - ra mat
      - launch
      - rollout
      - mở bán
      - mo ban
      - pre order
      - now available
      - release
      - debut
