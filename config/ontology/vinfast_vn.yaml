metadata:
  name: smap-vinfast-automotive-vn
  version: "2026.04.13-unified"
  description: >
    VinFast automotive domain ontology for Vietnamese social listening.
    Covers electric vehicles, battery/charging, service, pricing, and
    market expansion topics relevant to VinFast and the Vietnamese EV market.

domain_id: vinfast_vn

activation:
  primary_min_score: 3.0
  primary_min_matched_records: 2
  signals:
    - phrase: vinfast
      weight: 3.0
    - phrase: vf3
      weight: 2.5
    - phrase: vf5
      weight: 2.5
    - phrase: vf6
      weight: 2.5
    - phrase: vf7
      weight: 2.5
    - phrase: vf8
      weight: 2.5
    - phrase: vf9
      weight: 2.5
    - phrase: xe điện
      weight: 2.0
    - phrase: ô tô điện
      weight: 2.0
    - phrase: xanh sm
      weight: 2.0
    - phrase: phạm nhật vượng
      weight: 1.5
    - phrase: trạm sạc
      weight: 1.5
    - phrase: pin xe
      weight: 1.5
    - phrase: lăn bánh
      weight: 1.0

